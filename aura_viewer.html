<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>AURA Lab · William &amp; Mary — Preview</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    background:#06241b;
    display:flex;flex-direction:column;
    overflow:hidden;
    font-family:-apple-system,BlinkMacSystemFont,system-ui,sans-serif;
    color:#dff0e6;
  }
  header{
    display:flex;align-items:center;justify-content:space-between;gap:14px;
    padding:10px 18px;
    background:#04100a;
    border-bottom:1px solid rgba(164,236,196,.08);
    font-family:"JetBrains Mono", ui-monospace, monospace;
    font-size:11px;letter-spacing:.1em;color:#88a89a;text-transform:uppercase;
  }
  header .l{display:flex;align-items:center;gap:10px}
  header .l svg{width:22px;height:22px}
  header .l b{color:#dff0e6}
  header .device{
    display:flex;gap:4px;background:#0e1e17;padding:4px;border-radius:99px;border:1px solid rgba(164,236,196,.08);
  }
  header .device button{
    font:inherit;font-size:10px;letter-spacing:.08em;
    background:transparent;border:none;color:#88a89a;
    padding:6px 12px;border-radius:99px;cursor:pointer;text-transform:uppercase;
  }
  header .device button.on{background:#178a5a;color:#fff}
  header .open{color:#a4ecc4;text-decoration:none;border:1px solid rgba(164,236,196,.2);padding:6px 12px;border-radius:99px}
  header .open:hover{background:rgba(164,236,196,.1)}
  main{
    flex:1;display:grid;place-items:center;
    padding:18px;overflow:hidden;
    background:
      radial-gradient(900px 500px at 50% 30%, rgba(164,236,196,.05), transparent 70%),
      #06241b;
  }
  .frame{
    background:#fbfaf3;
    border-radius:14px;
    box-shadow: 0 30px 80px -20px rgba(0,0,0,.55), 0 14px 36px -12px rgba(0,0,0,.4);
    border:1px solid rgba(164,236,196,.10);
    overflow:hidden;
    transition: width .45s cubic-bezier(.32,.72,.12,1), height .45s cubic-bezier(.32,.72,.12,1);
  }
  iframe{width:100%;height:100%;border:none;background:#fbfaf3}
  .frame.desktop{width:100%;height:100%;max-width:1480px}
  .frame.tablet{width:820px;height:1100px;max-width:calc(100% - 40px);max-height:calc(100% - 40px)}
  .frame.mobile{width:390px;height:780px;max-width:calc(100% - 40px);max-height:calc(100% - 40px)}
  /* iframe scale hack so inner viewport reports the right width */
  .frame iframe{width:100% !important;height:100% !important}
</style>
</head>
<body>

<header>
  <div class="l">
    <svg viewBox="0 0 80 80" xmlns="http://www.w3.org/2000/svg" aria-label="William and Mary">
      <circle cx="40" cy="40" r="38" fill="#B9975B"/>
      <circle cx="40" cy="40" r="35" fill="#0b4530"/>
      <circle cx="40" cy="40" r="30" fill="none" stroke="#d3b16f" stroke-width="0.5" stroke-dasharray="0.6 1.4"/>
      <g transform="translate(40,42)" fill="#f3e3c0" font-family="Georgia, serif" font-weight="700">
        <text x="-7.2" y="-2" font-size="20" letter-spacing="-2.4">W</text>
        <text x="0.6"  y="6"  font-size="20" letter-spacing="-2.4">M</text>
      </g>
      <text x="40" y="59" text-anchor="middle" font-family="ui-monospace, monospace" font-size="4.6" fill="#d3b16f" letter-spacing="1.4">1693</text>
    </svg>
    <span>AURA · <b>Cinematic</b> · preview</span>
  </div>
  <div class="device" id="device">
    <button class="on" data-d="desktop">Desktop</button>
    <button data-d="tablet">Tablet</button>
    <button data-d="mobile">Mobile</button>
  </div>
  <a class="open" href="aura_variants/H_cinematic.html" target="_blank">open ↗</a>
</header>

<main>
  <div class="frame desktop" id="frame">
    <iframe src="aura_variants/H_cinematic.html"></iframe>
  </div>
</main>

<script>
  const frame = document.getElementById('frame');
  const device = document.getElementById('device');
  device.addEventListener('click', e => {
    if (e.target.tagName !== 'BUTTON') return;
    device.querySelectorAll('button').forEach(b => b.classList.remove('on'));
    e.target.classList.add('on');
    frame.className = 'frame ' + e.target.dataset.d;
  });
</script>
</body>
</html>
